{% extends "base.html" %}

{% block content %}
<div class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="avatar-circle" id="mentor-avatar">M</div>
            <h3 id="mentor-name-display">Loading...</h3>
            <p id="mentor-email-display">...</p>
            <button class="btn btn-outline btn-sm mt-3 w-full" onclick="openProfileModal()">Edit Profile</button>
        </div>
        <ul class="sidebar-nav mt-5">
            <li><a href="#" class="active" data-target="panel-posts">My Guidance Posts <span class="icon">📝</span></a></li>
            <li>
                <a href="#" data-target="panel-create">Create New Post <span class="icon">➕</span></a>
            </li>
        </ul>
    </aside>

    <div class="dashboard-content">
        <!-- Posts Panel -->
        <div id="panel-posts" class="panel active slide-up">
            <h2 class="section-title">My Guidance Posts</h2>
            <div id="mentor-posts-list" class="space-y-4">
                Loading...
            </div>
        </div>

        <!-- Create Panel -->
        <div id="panel-create" class="panel">
            <div class="card max-w-2xl mx-auto border-t-4 border-primary shadow-lg" style="border-top-color: #3b82f6;">
                <h2 class="section-title">Share Your Knowledge</h2>
                <form id="post-form">
                    <input type="hidden" id="post-id">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="post-title" class="form-control" required placeholder="E.g. Strategy for cracking coding interviews">
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="post-content" class="form-control" rows="8" required placeholder="Share your insights..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tags (Comma separated)</label>
                        <input type="text" id="post-tags" class="form-control" placeholder="E.g. DSA, Interview, Career">
                    </div>
                    <div class="form-group">
                        <label>Resource Link / PDF URL (Optional)</label>
                        <input type="url" id="post-resource" class="form-control" placeholder="https://example.com/guide.pdf">
                    </div>
                    <button type="submit" class="btn btn-primary w-full shadow-md mt-4">Publish Post</button>
                    <button type="button" id="btn-cancel-edit" class="btn btn-outline w-full mt-3 hidden" onclick="cancelEdit()">Cancel Edit</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Profile Modal -->
<div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 400px;">
        <div class="flex-between align-center border-b pb-4 mb-4">
            <h2>Edit Profile</h2>
            <button class="close-btn" onclick="closeProfileModal()">&times;</button>
        </div>
        <form id="profile-form">
            <div class="form-group"><label>Full Name</label><input type="text" id="prof-name" class="form-control" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="prof-email" class="form-control" required></div>
            <button type="submit" class="btn btn-primary w-full shadow-md mt-4">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
/* Dashboard Base Styles */
.dashboard-layout { display: flex; min-height: calc(100vh - 70px); background: #f8fafc; }
.sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1rem; position: sticky; top: 0; height: calc(100vh - 70px); overflow-y: auto; }
.sidebar-profile { text-align: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 1.5rem; }
.avatar-circle { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin: 0 auto 0.5rem; }
.sidebar-nav { list-style: none; padding: 0; margin: 0; }
.sidebar-nav li { margin-bottom: 0.25rem; }
.sidebar-nav a { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-radius: 0.75rem; color: #64748b; font-weight: 500; text-decoration: none; transition: all 0.2s; position: relative; }
.sidebar-nav a:hover { background: #eff6ff; color: #3b82f6; }
.sidebar-nav a.active { background: #3b82f6; color: white; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
.dashboard-content { flex: 1; padding: 2rem 3rem; overflow-y: auto; overflow-x: hidden; }

/* Panels */
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
.section-title { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 1.5rem; margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; display: inline-block; }

/* Utility Classes */
.space-y-4 > * + * { margin-top: 1rem; }
.flex-between { display: flex; justify-content: space-between; }
.align-center { align-items: center; }
.flex { display: flex; }
.gap-3 { gap: 0.75rem; }
.w-full { width: 100%; }
.mt-4 { margin-top: 1rem; }
.mt-3 { margin-top: 0.75rem; }
.mt-5 { margin-top: 1.25rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.pb-4 { padding-bottom: 1rem; }
.m-0 { margin: 0; }
.mx-auto { margin-left: auto; margin-right: auto; }
.border-b { border-bottom: 1px solid #e2e8f0; }
.border-t-4 { border-top: 4px solid #e2e8f0; }
.text-sm { font-size: 0.875rem; }
.text-gray { color: #64748b; }
.text-primary { color: #3b82f6; }
.text-danger { color: #ef4444; }
.bg-primary { background: #3b82f6; }
.max-w-2xl { max-width: 42rem; }
.shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
.hidden { display: none !important; }
.slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Cards & Grid */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.card { background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-radius: 1.25rem; padding: 1.75rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.6); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
.card:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); border-color: rgba(59, 130, 246, 0.25); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 0.35rem 0.8rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; box-shadow: 0 1px 2px rgba(0,0,0,0.05); text-transform: uppercase; letter-spacing: 0.05em; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; opacity: 1; transition: opacity 0.3s; }
.modal-content { background: white; border-radius: 1.25rem; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); padding: 1.5rem; animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes zoomIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

.close-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; line-height: 1; opacity: 0.8; transition: all 0.2s; }
.close-btn:hover { opacity: 1; text-decoration: none; transform: scale(1.1); }
.white-space-pre { white-space: pre-wrap; }
button:disabled { cursor: not-allowed; opacity: 0.7; }
</style>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'mentor') {
        window.location.href = '/login';
    }

    const getVerifiedBadge = (status) => {
        if (status === 'approved') {
            return `<span class="verified-badge" style="background: #d1fae5; color: #065f46; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 0.3rem;"><i class="fas fa-check-circle" style="color: #10b981;"></i> Verified Mentor</span>`;
        }
        return `<span class="badge badge-pending" style="margin-top: 0.5rem; background: #fef3c7; color: #b45309; border-color: #fde68a;">Pending Verification</span>`;
    };

    document.getElementById('mentor-name-display').innerText = user.name;
    document.getElementById('mentor-email-display').innerText = user.email;
    document.getElementById('mentor-avatar').innerText = user.name.charAt(0).toUpperCase();

    // Add badge under email
    const profileDiv = document.querySelector('.sidebar-profile');
    const badgeSpan = document.createElement('div');
    badgeSpan.innerHTML = getVerifiedBadge(user.status);
    profileDiv.appendChild(badgeSpan);

    let posts = [];

    async function loadData() {
        try {
            posts = await api.get('/mentor/posts');
            renderPosts();
        } catch(e) {
            console.error(e);
            if(e.message && e.message.includes('401')) { localStorage.clear(); window.location.href='/login'; }
        }
    }

    function renderPosts() {
        document.getElementById('mentor-posts-list').innerHTML = posts.map(p => `
            <div class="card shadow-md">
                <div class="flex-between align-center mb-2">
                    <h3 class="m-0 text-gray-900">${p.title}</h3>
                    <div class="flex gap-2">
                        <button class="btn btn-outline btn-sm text-primary" onclick="editPost(${p.id})">Edit</button>
                        <button class="btn btn-outline btn-sm text-danger border-red" onclick="deletePost(${p.id})">Delete</button>
                    </div>
                </div>
                <div class="mb-3 flex gap-2">
                    ${p.tags.map(t => `<span class="badge">${t}</span>`).join('')}
                </div>
                <p class="text-sm text-gray m-0 white-space-pre">${p.content}</p>
                ${p.resource_url ? `<div class="mt-3"><a href="${p.resource_url}" target="_blank" class="text-sm font-medium text-primary hover:underline">🔗 View Attached Resource</a></div>` : ''}
            </div>
        `).join('') || '<p class="text-gray text-center mt-6">You haven\'t shared any guidance posts yet.</p>';
    }

    window.editPost = (id) => {
        const p = posts.find(post => post.id === id);
        if(!p) return;
        document.getElementById('post-id').value = p.id;
        document.getElementById('post-title').value = p.title;
        document.getElementById('post-content').value = p.content;
        document.getElementById('post-tags').value = Array.isArray(p.tags) ? p.tags.join(', ') : '';
        document.getElementById('post-resource').value = p.resource_url || '';
        
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
        switchTab('panel-create');
        document.querySelector('.card h2').innerText = 'Edit Guidance Post';
    }

    window.cancelEdit = () => {
        document.getElementById('post-form').reset();
        document.getElementById('post-id').value = '';
        document.getElementById('btn-cancel-edit').classList.add('hidden');
        document.querySelector('.card h2').innerText = 'Share Your Knowledge';
        switchTab('panel-posts');
    }

    window.deletePost = async (id) => {
        if(confirm('Are you sure you want to delete this post?')) {
            try {
                await api.delete(`/mentor/posts/${id}`);
                loadData();
            } catch(e) { alert(e.message); }
        }
    }

    document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('post-id').value;
        const tags = document.getElementById('post-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
        
        const payload = {
            title: document.getElementById('post-title').value,
            content: document.getElementById('post-content').value,
            tags: tags,
            resourceUrl: document.getElementById('post-resource').value
        };

        try {
            if (id) await api.put(`/mentor/posts/${id}`, payload);
            else await api.post('/mentor/posts', payload);
            alert(`Post ${id ? 'updated' : 'published'} successfully!`);
            cancelEdit();
            loadData();
        } catch(err) { alert(err.message); }
    });

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            const res = await api.put('/auth/profile', {
                name: document.getElementById('prof-name').value,
                email: document.getElementById('prof-email').value
            });
            localStorage.setItem('user', JSON.stringify(res.user));
            alert('Profile updated!'); window.location.reload();
        } catch(err) { alert(err.message); }
    });

    window.openProfileModal = () => {
        document.getElementById('prof-name').value = user.name;
        document.getElementById('prof-email').value = user.email;
        document.getElementById('profile-modal').classList.remove('hidden');
    }
    window.closeProfileModal = () => document.getElementById('profile-modal').classList.add('hidden');

    function switchTab(targetId) {
        document.querySelectorAll('.sidebar-nav a').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => { p.classList.remove('active'); p.classList.remove('slide-up'); });
        
        const link = document.querySelector(`.sidebar-nav a[data-target="${targetId}"]`);
        if(link) link.classList.add('active');
        
        const target = document.getElementById(targetId);
        target.classList.add('active'); target.classList.add('slide-up');
    }

    document.querySelectorAll('.sidebar-nav a').forEach(l => {
        l.addEventListener('click', (e) => {
            e.preventDefault();
            switchTab(l.dataset.target);
        });
    });

    loadData();
</script>
{% endblock %}
