<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect Register</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    height:100vh;
}

/* LEFT SIDE */
.left{
    flex:1;
    background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');
    background-size:cover;
    background-position:center;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
}

.left h1{
    font-size:3rem;
}

.left p{
    margin-top:10px;
    opacity:0.9;
}

/* RIGHT */
.right{
    flex:1;
    background:#f4f8fb;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-y:auto;
}

/* CARD */
.card{
    width:100%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.card h2{
    text-align:center;
    color:#0ea5e9;
}

/* INPUT GROUP */
.input-group{
    margin-top:12px;
}

label{
    font-size:14px;
    color:#374151;
}

input, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #d1d5db;
    margin-top:5px;
}

input:focus, select:focus{
    border-color:#0ea5e9;
    outline:none;
    box-shadow:0 0 0 2px rgba(14,165,233,0.2);
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0ea5e9;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

/* ALERTS */
.msg{
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    display:none;
}

.error{
    background:#fee2e2;
    color:#dc2626;
}

.success{
    background:#d1fae5;
    color:#059669;
}

/* HIDDEN */
.hidden{
    display:none;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:15px;
}

.footer a{
    color:#0ea5e9;
    text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:900px){
    .left{
        display:none;
    }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <div>
        <h1>Join EduConnect</h1>
        <p>Empowering Students, Mentors & NGOs 🌍</p>
    </div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="card">

<h2>Create Account</h2>

<div id="error-msg" class="msg error"></div>
<div id="success-msg" class="msg success">Registration successful!</div>

<form id="register-form" enctype="multipart/form-data">

<div class="input-group">
<label>Account Type</label>
<select id="role" name="role">
    <option value="student">Student</option>
    <option value="ngo">NGO</option>
    <option value="mentor">Mentor</option>
</select>
</div>

<div class="input-group">
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" name="confirmPassword" required>
</div>

<!-- NGO -->
<div id="ngo-fields" class="hidden">
    <div class="input-group"><input type="text" name="orgName" placeholder="Organization Name"></div>
    <div class="input-group"><input type="text" name="regNo" placeholder="Registration Number"></div>
    <div class="input-group"><input type="text" name="address" placeholder="Address"></div>
    <div class="input-group"><input type="url" name="website" placeholder="Website"></div>
    <div class="input-group"><input type="file" name="certificate"></div>
</div>

<!-- Mentor -->
<div id="mentor-fields" class="hidden">
    <div class="input-group"><input type="url" name="linkedin" placeholder="LinkedIn"></div>
    <div class="input-group"><input type="text" name="organization" placeholder="Organization"></div>
    <div class="input-group"><input type="number" name="experience" placeholder="Experience"></div>
    <div class="input-group"><input type="file" name="resume"></div>
</div>

<button type="submit">Register</button>

</form>

<div class="footer">
Already have account? <a href="/login">Login</a>
</div>

</div>
</div>

<script>
const role = document.getElementById('role');
const ngoFields = document.getElementById('ngo-fields');
const mentorFields = document.getElementById('mentor-fields');

role.addEventListener('change', () => {
    ngoFields.classList.add('hidden');
    mentorFields.classList.add('hidden');

    if(role.value === 'ngo') ngoFields.classList.remove('hidden');
    if(role.value === 'mentor') mentorFields.classList.remove('hidden');
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button');
    const formData = new FormData(e.target);

    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if(formData.get('password') !== formData.get('confirmPassword')){
        errorMsg.innerText = "Passwords do not match";
        errorMsg.style.display = 'block';
        return;
    }

    btn.innerText = "Registering...";
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/register', {
            method:'POST',
            body:formData
        });

        const data = await res.json();
        if(!res.ok) throw new Error(data.message);

        successMsg.style.display = 'block';

        setTimeout(()=> window.location.href='/login',2000);

    } catch(err){
        errorMsg.innerText = err.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "Register";
    }
});
</script>

</body>
</html>
