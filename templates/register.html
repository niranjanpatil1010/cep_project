{% extends "base.html" %}

{% block content %}
<div class="form-container mt-4">
    <h2 class="text-center mb-4">Create an Account</h2>
    
    <div id="error-msg" class="hidden" style="color: #EF4444; background: #FEE2E2; padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem;"></div>
    <div id="success-msg" class="hidden" style="color: #10B981; background: #D1FAE5; padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem;">Registration successful! Redirecting to login...</div>

    <form id="register-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
        </div>
        <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" class="form-control" required>
                <option value="student">Student</option>
                <option value="ngo">NGO</option>
                <option value="mentor">Mentor</option>
            </select>
        </div>
        
        <!-- NGO specific fields -->
        <div id="ngo-fields" class="hidden">
            <div class="form-group">
                <label for="orgName">Organization Name</label>
                <input type="text" id="orgName" class="form-control" placeholder="EduCare Foundation">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
    </form>
    
    <p class="text-center mt-4" style="color: var(--gray-600);">
        Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('role').addEventListener('change', (e) => {
        const ngoFields = document.getElementById('ngo-fields');
        if (e.target.value === 'ngo') {
            ngoFields.classList.remove('hidden');
            document.getElementById('orgName').required = true;
        } else {
            ngoFields.classList.add('hidden');
            document.getElementById('orgName').required = false;
        }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const orgName = document.getElementById('orgName').value;
        
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');

        try {
            await api.post('/auth/register', { name, email, password, role, orgName });
            successMsg.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } catch (err) {
            errorMsg.innerText = err.message || 'Registration failed. Try a different email.';
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
